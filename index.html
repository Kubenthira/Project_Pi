<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium VRM Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Responsive UI Layout */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 320px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Premium Input Styles - Hidden as requested */
        .file-upload-btn {
            display: none;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            margin-top: 10px;
            display: inline-block;
        }

        /* Loading indicator */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .ui-overlay {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
        }

        .ui-overlay-emotions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .glass-panel-emotions {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .emotion-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .emotion-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .emotion-btn:active {
            transform: scale(0.95);
        }

        /* Webcam Preview Window */
        .webcam-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none; /* Shown when webcam starts */
        }

        #webcam-video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* Mirror view */
            background: #000;
        }

        .webcam-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #detected-emotion-text {
            color: #10b981; /* Emerald/Green */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- UI Overlay for Emotions -->
    <div class="ui-overlay-emotions">
        <div class="glass-panel-emotions">
            <button class="emotion-btn" onclick="setEmotion('happy')">😊 Happy</button>
            <button class="emotion-btn" onclick="setEmotion('sad')">😢 Sad</button>
            <button class="emotion-btn" onclick="setEmotion('angry')">😠 Angry</button>
            <button class="emotion-btn" onclick="setEmotion('neutral')">😐 Neutral</button>
        </div>
    </div>

    <!-- Face Detection elements -->
    <div class="webcam-container" id="webcam-preview">
        <video id="webcam-video" autoplay playsinline></video>
        <div class="webcam-label">AI SENSE: <span id="detected-emotion-text">IDLE</span></div>
    </div>
    <canvas id="capture-canvas" style="display:none;" width="320" height="240"></canvas>

    <div id="loader">
        <div class="spinner"></div>
        <div style="color: var(--text-dim); font-size: 0.9rem;">Loading Model...</div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js and plugins via CDN -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.2/dist/es-module-shims.js"></script>
    <!-- face-api.js for browser-based emotion detection -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, controls, currentVrm, clock;
        const container = document.getElementById('canvas-container');
        const loaderEl = document.getElementById('loader');

        // Expose setEmotion to window for button clicks
        window.setEmotion = (emotion) => {
            if (!currentVrm) return;
            
            // Map common model names to our internal emotion names
            const emotionMap = {
                'happy': 'happy',
                'sad': 'sad',
                'angry': 'angry',
                'neutral': 'neutral',
                'fear': 'sad',
                'disgust': 'angry',
                'surprise': 'happy'
            };
            
            const targetEmotion = emotionMap[emotion.toLowerCase()] || 'neutral';
            
            // 1. Reset all expressions
            if (currentVrm.expressionManager) {
                const expressions = ['happy', 'sad', 'angry', 'surprised', 'relaxed', 'neutral'];
                expressions.forEach(e => currentVrm.expressionManager.setValue(e, 0));
            }

            // 2. Reset bones to default A-pose
            applyAPose(currentVrm);

            // 3. Apply emotion specific changes
            const humanoid = currentVrm.humanoid;
            const neck = humanoid.getNormalizedBoneNode('neck');
            const spine = humanoid.getNormalizedBoneNode('spine');
            const leftUpperArm = humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = humanoid.getNormalizedBoneNode('rightUpperArm');

            switch(emotion) {
                case 'happy':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('happy', 1.0);
                    if (neck) neck.rotation.z = 0.1; // Slight head tilt
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.0; // Arms slightly more relaxed
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.0;
                    break;
                case 'sad':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('sad', 1.0);
                    if (neck) neck.rotation.x = 0.3; // Head down
                    if (spine) spine.rotation.x = 0.1; // Slumped
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.4; // Arms closer to body
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.4;
                    break;
                case 'angry':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('angry', 1.0);
                    if (neck) neck.rotation.x = -0.15; // Head tilted forward
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.1; // Tense arms
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.1;
                    break;
                case 'neutral':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('neutral', 1.0);
                    // Standard A-pose already applied in reset
                    break;
            }
            
            console.log(`Emotion set to: ${emotion}`);
        };

        init();
        animate();

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            // Camera - Positioned for a slightly wider Head-to-Waist framing
            camera = new THREE.PerspectiveCamera(30.0, window.innerWidth / window.innerHeight, 0.1, 20.0);
            camera.position.set(0.0, 1.4, 1.0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            // Controls - View locked as requested
            controls = new OrbitControls(camera, renderer.domElement);
            controls.screenSpacePanning = true;
            controls.target.set(0.0, 1.35, 0.0);
            controls.enableRotate = false; // Disable rotation
            controls.enableZoom = false;   // Disable zoom
            controls.enablePan = false;    // Disable pan
            controls.update();

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, Math.PI);
            light.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            clock = new THREE.Clock();

            // Auto-load the primary model
            loadDefaultModel();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
        }

        function loadDefaultModel() {
            const defaultModelPath = './8590256991748008892.vrm';
            loadVRM(defaultModelPath, 'Default Model');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            loadVRM(url, file.name);
        }

        function loadVRM(url, name) {
            // Remove previous VRM
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                VRMUtils.deepDispose(currentVrm.scene);
            }

            loaderEl.style.display = 'flex';

            const loader = new GLTFLoader();
            loader.register((parser) => {
                return new VRMLoaderPlugin(parser);
            });

            loader.load(
                url,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    
                    // Restore front-face and standard scale
                    vrm.scene.scale.set(1.0, 1.0, 1.0);
                    vrm.scene.rotation.y = Math.PI;
                    
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    
                    loaderEl.style.display = 'none';
                    console.log('VRM loaded:', vrm);
                    
                    // Apply A-pose (remove T-pose)
                    applyAPose(vrm);

                    // Extract and log bones to the console
                    extractBones(vrm);

                    // Auto-start Face Detection after model load
                    startFaceDetection();
                },
                (progress) => {
                    // Silent loading for cleaner UI
                },
                (error) => {
                    console.error(error);
                    loaderEl.style.display = 'none';
                }
            );
        }

        function applyAPose(vrm) {
            const leftUpperArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
            
            if (leftUpperArm) {
                leftUpperArm.rotation.z = 1.2; // Rotate down (~70 degrees)
            }
            if (rightUpperArm) {
                rightUpperArm.rotation.z = -1.2;
            }

            // Optional: slightly bend elbows for more natural look
            const leftLowerArm = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
            const rightLowerArm = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
            if (leftLowerArm) leftLowerArm.rotation.y = 0.2;
            if (rightLowerArm) rightLowerArm.rotation.y = -0.2;
        }

        function extractBones(vrm) {
            console.log('--- Humanoid Bones Extraction ---');
            const bones = {};
            
            // Get all humanoid bones defined in the VRM spec
            const humanoid = vrm.humanoid;
            if (humanoid) {
                // We can iterate through the normalized bone nodes
                for (const boneName in humanoid.humanBones) {
                    const node = humanoid.getNormalizedBoneNode(boneName);
                    if (node) {
                        bones[boneName] = {
                            name: node.name,
                            position: node.position.clone(),
                            rotation: node.rotation.clone(),
                            threeNode: node
                        };
                        // console.log(`Bone: ${boneName} -> Node: ${node.name}`);
                    }
                }
            }
            
            window.vrmBones = bones; // Expose to window for easy access in console
            console.log('Bones extracted to window.vrmBones');
            console.log(bones);
            console.log('---------------------------------');
        }

        async function startFaceDetection() {
            const video = document.getElementById('webcam-video');
            const emotionText = document.getElementById('detected-emotion-text');

            try {
                emotionText.innerText = "LOADING AI...";
                
                // Load face-api models from CDN
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                
                // Show the preview window
                document.getElementById('webcam-preview').style.display = 'block';
                emotionText.innerText = "READY";
                console.log("Webcam and Face-API started.");

                // Detection Loop (every 200ms for high responsiveness)
                setInterval(async () => {
                    if (video.paused || video.ended) return;

                    const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceExpressions();

                    if (detections) {
                        // Get the most likely emotion
                        const expressions = detections.expressions;
                        const bestEmotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                        
                        // Only trigger if confidence is reasonable
                        if (expressions[bestEmotion] > 0.4) {
                            emotionText.innerText = bestEmotion.toUpperCase();
                            setEmotion(bestEmotion);
                        }
                    } else {
                        emotionText.innerText = "...";
                    }
                }, 200);

            } catch (err) {
                console.error("Face Detection Error:", err);
                emotionText.innerText = "ERROR";
                alert("Face detection failed to start. Please ensure webcam is allowed and you have an internet connection to load AI models.");
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();

            if (currentVrm) {
                // Procedural Idle Animation - Bone swaying disabled as requested
                const t = clock.elapsedTime;
                
                // Automatic Blinking - Keeping this as it's an expression
                const blinkValue = Math.max(0, Math.sin(t * 3.0) * 10 - 9); // Quick blink every few seconds
                if (currentVrm.expressionManager) {
                    currentVrm.expressionManager.setValue('blink', blinkValue);
                }

                currentVrm.update(deltaTime);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
