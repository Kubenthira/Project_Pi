<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium VRM Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Responsive UI Layout */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 320px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Premium Input Styles - Hidden as requested */
        .file-upload-btn {
            display: none;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            margin-top: 10px;
            display: inline-block;
        }

        /* Loading indicator */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .ui-overlay {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
        }

        /* Language selection and emotion overlays - Removed for cleaner view */

        .glass-panel-languages {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn:hover { background: rgba(255, 255, 255, 0.15); }

        /* Integrated Microphone Styles */
        .voice-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .voice-btn svg { width: 22px; height: 22px; fill: white; }

        .voice-btn:hover {
            transform: scale(1.1);
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }

        .voice-btn.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #voice-caption {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            display: none;
            z-index: 200;
        }

        /* Webcam Preview Window */
        .webcam-container {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 160px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none; /* Shown when webcam starts */
        }

        #webcam-video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* Mirror view */
            background: #000;
        }

        .webcam-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #detected-emotion-text {
            color: #10b981; /* Emerald/Green */
            font-weight: bold;
        }
        /* Recording indicator pulse */
        .recording {
            background: #ff4444 !important;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Chat Window UI */
        #chat-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            height: 400px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.3) !important;
            backdrop-filter: blur(8px) !important;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styling */
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        #chat-input-area {
            padding: 15px;
            background: transparent;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-input:focus {
            border-color: var(--primary);
        }

        #send-btn {
            background: var(--primary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        #send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.1);
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #chat-container {
                width: calc(100% - 40px);
                bottom: 20px;
                right: 20px;
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div id="chat-container" class="glass-panel">
        <div id="chat-messages">
            <div class="message ai">Hi! I'm your AI assistant. How can I help you today?</div>
        </div>
        <div id="chat-input-area">
            <button id="mic-btn" class="voice-btn" onclick="toggleVoice()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 3.31-2.69 6-6 6s-6-2.69-6-6H3c0 4.42 3.58 8 8 8s8-3.58 8-8h-2z"/></svg>
            </button>
            <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <!-- UI Overlay for Language Selection -->
    <div class="ui-overlay-languages">
        <!-- Language buttons removed for Auto-Detection -->
    </div>
    <div class="webcam-container" id="webcam-preview">
        <video id="webcam-video" autoplay playsinline></video>
        <div class="webcam-label">AI SENSE: <span id="detected-emotion-text">IDLE</span></div>
    </div>
    <canvas id="capture-canvas" style="display:none;" width="320" height="240"></canvas>

    <div id="loader">
        <div class="spinner"></div>
        <div style="color: var(--text-dim); font-size: 0.9rem;">Loading Model...</div>
    </div>

    <div id="canvas-container"></div>

    <!-- Voice Control -->
        <div id="voice-caption" class="voice-caption"></div>


    <!-- Three.js and plugins via CDN -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.2/dist/es-module-shims.js"></script>
    <!-- face-api.js for browser-based emotion detection -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, controls, currentVrm, clock;
        const container = document.getElementById('canvas-container');
        const loaderEl = document.getElementById('loader');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        window.sendMessage = () => {
            const text = chatInput.value.trim();
            if (!text) return;
            
            appendMessage('user', text);
            chatInput.value = '';
            processTranscript(text);
        };

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.sendMessage();
        });

        // Expose setEmotion to window for button clicks
        window.setEmotion = (emotion) => {
            if (!currentVrm) return;
            
            // Map common model names to our internal emotion names
            const emotionMap = {
                'happy': 'happy',
                'sad': 'sad',
                'angry': 'angry',
                'neutral': 'neutral',
                'fear': 'sad',
                'disgust': 'angry',
                'surprise': 'happy'
            };
            
            const targetEmotion = emotionMap[emotion.toLowerCase()] || 'neutral';
            
            // 1. Reset all expressions
            if (currentVrm.expressionManager) {
                const expressions = ['happy', 'sad', 'angry', 'surprised', 'relaxed', 'neutral'];
                expressions.forEach(e => currentVrm.expressionManager.setValue(e, 0));
            }

            // 2. Reset bones to default A-pose
            applyAPose(currentVrm);

            // 3. Apply emotion specific changes
            const humanoid = currentVrm.humanoid;
            const neck = humanoid.getNormalizedBoneNode('neck');
            const spine = humanoid.getNormalizedBoneNode('spine');
            const leftUpperArm = humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = humanoid.getNormalizedBoneNode('rightUpperArm');

            switch(targetEmotion) {
                case 'happy':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('happy', 1.0);
                    if (neck) neck.rotation.z = 0.1; // Slight head tilt
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.0; // Arms slightly more relaxed
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.0;
                    break;
                case 'sad':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('sad', 1.0);
                    if (neck) neck.rotation.x = 0.3; // Head down
                    if (spine) spine.rotation.x = 0.1; // Slumped
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.4; // Arms closer to body
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.4;
                    break;
                case 'angry':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('angry', 1.0);
                    if (neck) neck.rotation.x = -0.15; // Head tilted forward
                    if (leftUpperArm) leftUpperArm.rotation.z = 1.1; // Tense arms
                    if (rightUpperArm) rightUpperArm.rotation.z = -1.1;
                    break;
                case 'neutral':
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('neutral', 1.0);
                    // Standard A-pose already applied in reset
                    break;
            }
            
            console.log(`Emotion set to: ${targetEmotion} (from ${emotion})`);
        };

        // --- Voice & AI Logic ---
        let recognition;
        let isRecording = false;
        const micBtn = document.getElementById('mic-btn');
        const captionEl = document.getElementById('voice-caption');

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.error("Browser STT not supported");
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                captionEl.innerText = "Listening...";
                captionEl.style.display = 'block';
                setEmotion('neutral');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                console.log("STT Result:", transcript);
                captionEl.innerText = `You: ${transcript}`;
                processTranscript(transcript);
            };

            recognition.onerror = (e) => {
                console.error("STT Error:", e.error);
                stopRecognition();
            };

            recognition.onend = () => {
                stopRecognition();
            };
        }

        window.toggleVoice = () => {
            if (isRecording) {
                recognition.stop();
            } else {
                if (!recognition) initRecognition();
                recognition.start();
            }
        };

        function stopRecognition() {
            isRecording = false;
            micBtn.classList.remove('recording');
        }

        async function checkBackendStatus() {
            try {
                const response = await fetch('http://localhost:8016/status');
                const data = await response.json();
                console.log("Backend Status:", data);
                if (data.status === 'online') {
                    captionEl.innerText = "Sweet Shruti AI Online (8016)";
                    captionEl.style.display = 'block';
                    setTimeout(() => { if (!isRecording) captionEl.style.display = 'none'; }, 2000);
                }
            } catch (err) {
                console.warn("Backend Status Check Failed.");
            }
        }

        async function processTranscript(text) {
            captionEl.innerText = "Thinking...";
            captionEl.style.display = 'block';

            try {
                // 1. Get AI Response from Groq Brain
                console.log("Sending text to Groq Brain...");
                const chatRes = await fetch('http://localhost:8016/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!chatRes.ok) {
                    const errorText = await chatRes.text();
                    console.error("Groq Proxy Error Response:", errorText);
                    throw new Error(`Groq Connection Failed: ${chatRes.status}`);
                }
                
                const chatData = await chatRes.json();
                console.log("Groq Response Data:", chatData);
                
                const aiText = chatData.response || "";
                const aiLang = chatData.lang || 'en-IN';
                captionEl.innerText = `AI: ${aiText}`;
                appendMessage('ai', aiText);

                // 2. Try to get Sarvam AI Voice
                try {
                    console.log(`Requesting Sarvam AI Voice (Shruti) in ${aiLang}...`);
                    const sarvamRes = await fetch('http://localhost:8016/tts_sarvam', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: aiText, lang: aiLang })
                    });
                    const sarvamData = await sarvamRes.json();

                    if (sarvamData.audio_base64) {
                        console.log("Playing Sarvam Premium Voice (Shruti)");
                        playAudio(sarvamData.audio_base64);
                        setEmotion('happy');
                    } else {
                        throw new Error("Sarvam Failed");
                    }
                } catch (err) {
                    console.error("Sarvam TTS Failed:", err.message);
                    captionEl.innerText = "Voice Error (Sarvam)";
                }

            } catch (err) {
                console.error("Interaction Failed:", err);
                captionEl.innerText = "Connection Error";
            }
        }

        function playAudio(audioSource) {
            const audio = new Audio(audioSource);
            audio.play().catch(e => {
                console.error("Audio Playback Error:", e);
                // Fallback to text to speech if audio fails
                playBrowserVoice(document.getElementById('voice-caption').innerText.replace('AI: ', ''));
            });
            
            // Lip Sync using 'aa' expression
            const lipSyncInterval = setInterval(() => {
                if (audio.paused || audio.ended) {
                    clearInterval(lipSyncInterval);
                    if (currentVrm.expressionManager) currentVrm.expressionManager.setValue('aa', 0);
                    return;
                }
                if (currentVrm.expressionManager) {
                    const val = Math.random() * 0.4 + 0.3;
                    currentVrm.expressionManager.setValue('aa', val);
                }
            }, 80);

            audio.onended = () => {
                setTimeout(() => {
                    document.getElementById('voice-caption').style.display = 'none';
                    setEmotion('neutral');
                }, 2000);
            };
        }

        function playBrowserVoice(text) {
            if (!window.speechSynthesis) {
                console.error("Browser does not support Speech Synthesis");
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-IN';
            window.speechSynthesis.speak(utterance);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleVoice();
            }
        });

        init();
        animate();
        // Check backend connection on load
        setTimeout(checkBackendStatus, 1000);

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            // Camera - Positioned for a slightly wider Head-to-Waist framing
            camera = new THREE.PerspectiveCamera(30.0, window.innerWidth / window.innerHeight, 0.1, 20.0);
            camera.position.set(0.0, 1.4, 1.0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            // Controls - View locked as requested
            controls = new OrbitControls(camera, renderer.domElement);
            controls.screenSpacePanning = true;
            controls.target.set(0.0, 1.35, 0.0);
            controls.enableRotate = false; // Disable rotation
            controls.enableZoom = false;   // Disable zoom
            controls.enablePan = false;    // Disable pan
            controls.update();

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, Math.PI);
            light.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            clock = new THREE.Clock();

            // Auto-load the primary model
            loadDefaultModel();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
        }

        function loadDefaultModel() {
            const defaultModelPath = './8590256991748008892.vrm';
            loadVRM(defaultModelPath, 'Default Model');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            loadVRM(url, file.name);
        }

        function loadVRM(url, name) {
            // Remove previous VRM
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                VRMUtils.deepDispose(currentVrm.scene);
            }

            loaderEl.style.display = 'flex';

            const loader = new GLTFLoader();
            loader.register((parser) => {
                return new VRMLoaderPlugin(parser);
            });

            loader.load(
                url,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    
                    // Restore front-face and standard scale
                    vrm.scene.scale.set(1.0, 1.0, 1.0);
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.position.x = -0.1; // Shift slightly to the left from user perspective (slightly right from previous -0.3)
                    
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    
                    loaderEl.style.display = 'none';
                    console.log('VRM loaded:', vrm);
                    
                    // Apply A-pose (remove T-pose)
                    applyAPose(vrm);

                    // Extract and log bones to the console
                    extractBones(vrm);

                    // Auto-start Face Detection after model load
                    startFaceDetection();
                },
                (progress) => {
                    // Silent loading for cleaner UI
                },
                (error) => {
                    console.error(error);
                    loaderEl.style.display = 'none';
                }
            );
        }

        function applyAPose(vrm) {
            const leftUpperArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
            
            if (leftUpperArm) {
                leftUpperArm.rotation.z = 1.2; // Rotate down (~70 degrees)
            }
            if (rightUpperArm) {
                rightUpperArm.rotation.z = -1.2;
            }

            // Optional: slightly bend elbows for more natural look
            const leftLowerArm = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
            const rightLowerArm = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
            if (leftLowerArm) leftLowerArm.rotation.y = 0.2;
            if (rightLowerArm) rightLowerArm.rotation.y = -0.2;
        }

        function extractBones(vrm) {
            console.log('--- Humanoid Bones Extraction ---');
            const bones = {};
            
            // Get all humanoid bones defined in the VRM spec
            const humanoid = vrm.humanoid;
            if (humanoid) {
                // We can iterate through the normalized bone nodes
                for (const boneName in humanoid.humanBones) {
                    const node = humanoid.getNormalizedBoneNode(boneName);
                    if (node) {
                        bones[boneName] = {
                            name: node.name,
                            position: node.position.clone(),
                            rotation: node.rotation.clone(),
                            threeNode: node
                        };
                        // console.log(`Bone: ${boneName} -> Node: ${node.name}`);
                    }
                }
            }
            
            window.vrmBones = bones; // Expose to window for easy access in console
            console.log('Bones extracted to window.vrmBones');
            console.log(bones);
            console.log('---------------------------------');
        }

        async function startFaceDetection() {
            const video = document.getElementById('webcam-video');
            const emotionText = document.getElementById('detected-emotion-text');

            try {
                emotionText.innerText = "LOADING AI...";
                
                // Load face-api models from CDN
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                
                // Show the preview window
                document.getElementById('webcam-preview').style.display = 'block';
                emotionText.innerText = "READY";
                console.log("Webcam and Face-API started.");

                // Detection Loop (every 200ms for high responsiveness)
                setInterval(async () => {
                    if (video.paused || video.ended) return;

                    const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceExpressions();

                    if (detections) {
                        // Get the most likely emotion
                        const expressions = detections.expressions;
                        const bestEmotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                        
                        // Only trigger if confidence is reasonable
                        if (expressions[bestEmotion] > 0.4) {
                            emotionText.innerText = bestEmotion.toUpperCase();
                            setEmotion(bestEmotion);
                        }
                    } else {
                        emotionText.innerText = "...";
                    }
                }, 200);

            } catch (err) {
                console.error("Face Detection Error:", err);
                emotionText.innerText = "ERROR";
                alert("Face detection failed to start. Please ensure webcam is allowed and you have an internet connection to load AI models.");
            }
        }
    </script>
